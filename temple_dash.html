<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TEMPLE DASH</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#030806;overflow:hidden;font-family:'Share Tech Mono',monospace;user-select:none;touch-action:none}
canvas{display:block;position:fixed;top:0;left:0}

/* ── HUD ── */
#hud{position:fixed;inset:0;pointer-events:none;display:none;z-index:10}
#hud-score{position:absolute;top:22px;left:50%;transform:translateX(-50%);
  font-family:'Cinzel',serif;font-size:clamp(22px,4vw,36px);font-weight:700;
  color:#ffcc44;text-shadow:0 0 16px rgba(255,180,0,.7),0 2px 0 #000;letter-spacing:3px}
#hud-dist{position:absolute;top:20px;left:24px;font-size:13px;color:rgba(200,180,120,.8);letter-spacing:2px}
#hud-best{position:absolute;top:38px;left:24px;font-size:11px;color:rgba(200,180,120,.45);letter-spacing:1px}
#hud-coins{position:absolute;top:20px;right:24px;font-size:14px;color:#ffcc44;letter-spacing:2px;text-shadow:0 0 8px rgba(255,200,0,.5)}
#hud-speed{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:4px;color:rgba(200,160,80,.5)}
#hud-controls{position:absolute;bottom:20px;left:24px;font-size:10px;color:rgba(200,180,120,.3);line-height:1.6}

/* ── START SCREEN ── */
#start-screen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 55%,#0d1a08 0%,#020703 100%)}
.flame-deco{font-size:32px;margin-bottom:4px;animation:flamePulse 2s infinite alternate}
@keyframes flamePulse{from{filter:drop-shadow(0 0 6px #ff6600)}to{filter:drop-shadow(0 0 18px #ffaa00)}}
.s-pre{font-size:10px;letter-spacing:8px;color:rgba(200,160,60,.5);margin-bottom:8px}
.s-title{font-family:'Cinzel',serif;font-size:clamp(52px,10vw,96px);font-weight:900;
  color:#ffcc44;text-shadow:0 0 30px rgba(255,180,0,.6),0 0 70px rgba(255,100,0,.3);
  letter-spacing:8px;line-height:1;margin-bottom:10px}
.s-sub{font-size:11px;letter-spacing:5px;color:rgba(200,160,60,.6);margin-bottom:40px}
.ctrl-list{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;margin-bottom:40px;
  color:rgba(200,180,100,.55);font-size:12px}
.ctrl-item{display:flex;align-items:center;gap:10px}
.kk{padding:3px 8px;border:1px solid rgba(200,160,60,.35);background:rgba(255,180,0,.06);
  color:#ffcc44;font-size:10px;letter-spacing:1px;min-width:48px;text-align:center}
.s-start-btn{padding:15px 60px;background:transparent;border:2px solid #ffcc44;
  color:#ffcc44;font-family:'Cinzel',serif;font-size:16px;font-weight:700;letter-spacing:6px;
  cursor:pointer;box-shadow:0 0 24px rgba(255,180,0,.25),inset 0 0 24px rgba(255,180,0,.06);
  transition:all .2s;pointer-events:all}
.s-start-btn:hover{background:rgba(255,180,0,.08);box-shadow:0 0 48px rgba(255,180,0,.45)}

/* ── GAME OVER ── */
#over-screen{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.88);
  display:none;flex-direction:column;align-items:center;justify-content:center}
.over-title{font-family:'Cinzel',serif;font-size:clamp(42px,8vw,72px);font-weight:900;
  color:#ff4400;text-shadow:0 0 30px #ff2200;letter-spacing:6px;margin-bottom:6px;
  animation:overpulse 2s infinite}
@keyframes overpulse{50%{text-shadow:0 0 55px #ff5500,0 0 100px rgba(255,80,0,.4)}}
.over-sub{font-size:11px;letter-spacing:4px;color:rgba(255,100,50,.5);margin-bottom:36px}
.over-stats{display:flex;gap:20px;margin-bottom:36px;flex-wrap:wrap;justify-content:center}
.stat-box{text-align:center;padding:16px 24px;border:1px solid rgba(255,180,0,.2);
  background:rgba(255,180,0,.04);min-width:110px}
.stat-lbl{font-size:8px;letter-spacing:3px;color:rgba(255,180,0,.4);text-transform:uppercase;margin-bottom:7px}
.stat-val{font-family:'Cinzel',serif;font-size:24px;color:#ffcc44;text-shadow:0 0 8px rgba(255,180,0,.5)}
.stat-val.amber{color:#ffaa22}
.over-btn{padding:13px 50px;background:transparent;border:2px solid #ff4400;
  color:#ff4400;font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:5px;
  cursor:pointer;box-shadow:0 0 16px rgba(255,60,0,.2);transition:all .2s;pointer-events:all}
.over-btn:hover{background:rgba(255,60,0,.1);box-shadow:0 0 36px rgba(255,60,0,.45)}

/* ── DAMAGE FLASH ── */
#dmg-flash{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(200,0,0,.75) 100%)}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="hud-score">0</div>
  <div id="hud-dist">DIST: 0m</div>
  <div id="hud-best">BEST: 0</div>
  <div id="hud-coins">&#9670; 0</div>
  <div id="hud-speed">SPEED: 1.0x</div>
  <div id="hud-controls">
    &#8592;&#8594; DODGE &nbsp;&#8593; JUMP &nbsp;&#8595; SLIDE
  </div>
</div>
<div id="dmg-flash"></div>

<div id="start-screen">
  <div class="flame-deco">&#128293;</div>
  <div class="s-pre">// ANCIENT RUINS AWAIT</div>
  <div class="s-title">TEMPLE DASH</div>
  <div class="s-sub">RUN. DODGE. SURVIVE.</div>
  <div class="ctrl-list">
    <div class="ctrl-item"><span class="kk">&#8592; / A</span>Lane Left</div>
    <div class="ctrl-item"><span class="kk">&#8593; / W</span>Jump</div>
    <div class="ctrl-item"><span class="kk">&#8594; / D</span>Lane Right</div>
    <div class="ctrl-item"><span class="kk">&#8595; / S</span>Slide</div>
  </div>
  <button class="s-start-btn" id="start-btn">BEGIN RUN</button>
</div>

<div id="over-screen">
  <div class="over-title">FALLEN</div>
  <div class="over-sub">THE TEMPLE CLAIMS ANOTHER</div>
  <div class="over-stats">
    <div class="stat-box"><div class="stat-lbl">Score</div><div class="stat-val" id="fin-score">0</div></div>
    <div class="stat-box"><div class="stat-lbl">Best</div><div class="stat-val amber" id="fin-best">0</div></div>
    <div class="stat-box"><div class="stat-lbl">Distance</div><div class="stat-val" id="fin-dist">0m</div></div>
    <div class="stat-box"><div class="stat-lbl">Coins</div><div class="stat-val" id="fin-coins">0</div></div>
  </div>
  <button class="over-btn" id="restart-btn">RUN AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
//  TEMPLE DASH - Endless Runner
// ============================================================

// ── Constants ────────────────────────────────────────────
var LANES     = [-2.2, 0, 2.2];
var TRACK_W   = 8.0;
var TRACK_H   = 0.4;
var SEG_LEN   = 24;
var POOL_SIZE = 14;
var BEHIND_CULL = 28;
var LOOKAHEAD   = 260;
var PLAYER_START_Z = 10;
var JUMP_VY   = 10;
var GRAVITY   = 24;
var SLIDE_DUR = 0.72;
var BASE_SPEED  = 14;
var MAX_SPEED   = 34;
var LANE_SPD    = 11;
var COIN_SCORE  = 50;

// ── Renderer / Scene ─────────────────────────────────────
var W = window.innerWidth, H = window.innerHeight;
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a06);
scene.fog = new THREE.FogExp2(0x060c06, 0.025);

var camera = new THREE.PerspectiveCamera(65, W / H, 0.1, 300);
var renderer = new THREE.WebGLRenderer({canvas: document.getElementById('c'), antialias: true});
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

window.addEventListener('resize', function() {
  W = window.innerWidth; H = window.innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

// ── Lights ────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x0e1a0a, 5));

var moonLight = new THREE.DirectionalLight(0xaaddbb, 1.2);
moonLight.position.set(-15, 40, -30);
moonLight.castShadow = true;
moonLight.shadow.mapSize.set(1024, 1024);
moonLight.shadow.camera.left  = -50;
moonLight.shadow.camera.right =  50;
moonLight.shadow.camera.near  = 0.1;
moonLight.shadow.camera.far   = 120;
scene.add(moonLight);

// Moving forward light (follows player)
var fwdLight = new THREE.PointLight(0xff8844, 2.0, 55);
scene.add(fwdLight);

var sideLight = new THREE.PointLight(0x4488ff, 0.8, 40);
sideLight.position.set(-12, 5, 0);
scene.add(sideLight);

// ── Materials ─────────────────────────────────────────────
var M = {
  track:    new THREE.MeshLambertMaterial({color: 0x1e1812}),
  trackB:   new THREE.MeshLambertMaterial({color: 0x232018}),
  wall:     new THREE.MeshLambertMaterial({color: 0x2a2014}),
  pillar:   new THREE.MeshLambertMaterial({color: 0x282016}),
  barrier:  new THREE.MeshLambertMaterial({color: 0x6a2210, emissive: 0x280806}),
  root:     new THREE.MeshLambertMaterial({color: 0x503818}),
  beam:     new THREE.MeshLambertMaterial({color: 0x252520}),
  fire:     new THREE.MeshLambertMaterial({color: 0xff5500, emissive: 0xff2200}),
  gap:      new THREE.MeshBasicMaterial({color: 0x000000}),
  coin:     new THREE.MeshLambertMaterial({color: 0xffcc22, emissive: 0x886600}),
  pJacket:  new THREE.MeshLambertMaterial({color: 0x285060}),
  pSkin:    new THREE.MeshLambertMaterial({color: 0xc4a882}),
  pPants:   new THREE.MeshLambertMaterial({color: 0x3a2a18}),
  pBoot:    new THREE.MeshLambertMaterial({color: 0x1a1208}),
  pHair:    new THREE.MeshLambertMaterial({color: 0x1a0e06}),
  pPack:    new THREE.MeshLambertMaterial({color: 0x8a4820}),
  dead:     new THREE.MeshLambertMaterial({color: 0x440000, emissive: 0x220000}),
};

// ── Helpers ───────────────────────────────────────────────
function box(w, h, d, mat) {
  return new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat || M.track);
}

// ── Character ─────────────────────────────────────────────
var char = (function() {
  var root = new THREE.Group();

  var torso = box(0.50, 0.65, 0.30, M.pJacket);
  torso.position.y = 0.63; root.add(torso);

  var pack = box(0.34, 0.48, 0.16, M.pPack);
  pack.position.set(0, 0.65, -0.22); root.add(pack);

  var head = box(0.42, 0.42, 0.40, M.pSkin);
  head.position.y = 1.17; root.add(head);

  var hair = box(0.44, 0.13, 0.43, M.pHair);
  hair.position.set(0, 1.41, 0); root.add(hair);

  // Left arm group (shoulder pivot)
  var laG = new THREE.Group(); laG.position.set(-0.36, 0.92, 0);
  var la  = box(0.20, 0.50, 0.20, M.pJacket); la.position.y = -0.25; laG.add(la);
  var lh  = box(0.17, 0.13, 0.17, M.pSkin);   lh.position.y = -0.57; laG.add(lh);
  root.add(laG);

  // Right arm group
  var raG = new THREE.Group(); raG.position.set(0.36, 0.92, 0);
  var ra  = box(0.20, 0.50, 0.20, M.pJacket); ra.position.y = -0.25; raG.add(ra);
  var rh  = box(0.17, 0.13, 0.17, M.pSkin);   rh.position.y = -0.57; raG.add(rh);
  root.add(raG);

  // Left leg group (hip pivot)
  var llG = new THREE.Group(); llG.position.set(-0.14, 0.30, 0);
  var ll  = box(0.23, 0.60, 0.23, M.pPants); ll.position.y = -0.30; llG.add(ll);
  var lb  = box(0.24, 0.18, 0.30, M.pBoot);  lb.position.set(0, -0.69, 0.04); llG.add(lb);
  root.add(llG);

  // Right leg group
  var rlG = new THREE.Group(); rlG.position.set(0.14, 0.30, 0);
  var rl  = box(0.23, 0.60, 0.23, M.pPants); rl.position.y = -0.30; rlG.add(rl);
  var rb  = box(0.24, 0.18, 0.30, M.pBoot);  rb.position.set(0, -0.69, 0.04); rlG.add(rb);
  root.add(rlG);

  root.traverse(function(c) { if (c.isMesh) c.castShadow = true; });
  scene.add(root);

  return { root: root, laG: laG, raG: raG, llG: llG, rlG: rlG, head: head };
}());

// ── Game State ────────────────────────────────────────────
function getHS() { try { return parseInt(localStorage.getItem('td_hs')) || 0; } catch(e) { return 0; } }
function saveHS(v) { try { localStorage.setItem('td_hs', v); } catch(e) {} }

var G = {
  running: false,
  over: false,
  speed: BASE_SPEED,
  dist: 0,
  score: 0,
  coins: 0,
  hs: getHS(),
  dmgFlash: 0
};

var P = {
  lane: 1, targetLane: 1,
  x: LANES[1], y: 0, z: PLAYER_START_Z,
  vy: 0,
  jumping: false,
  sliding: false, slideTimer: 0,
  dead: false, deathTimer: 0,
  runPhase: 0,
  tilt: 0,
  invincible: 0
};

// ── Track Segments ────────────────────────────────────────
var segments = [];
var nextFarZ = 0;
var globalSegIdx = 0;

function makeFloorGroup() {
  var grp = new THREE.Group();

  // Main floor tile (local Z: 0 to SEG_LEN, centered at SEG_LEN/2)
  var fl = box(TRACK_W, TRACK_H, SEG_LEN, M.track);
  fl.position.set(0, -TRACK_H / 2, SEG_LEN / 2);
  fl.receiveShadow = true;
  grp.add(fl);

  // Alternating tile accent strips
  for (var t = 0; t < 4; t++) {
    var strip = box(TRACK_W * 0.98, 0.02, 0.18, M.trackB);
    strip.position.set(0, 0.01, 4 + t * 5);
    grp.add(strip);
  }

  // Left wall
  var lw = box(0.38, 2.2, SEG_LEN, M.wall);
  lw.position.set(-(TRACK_W / 2 + 0.19), 0.9, SEG_LEN / 2);
  lw.receiveShadow = true;
  grp.add(lw);

  // Right wall
  var rw = box(0.38, 2.2, SEG_LEN, M.wall);
  rw.position.set(TRACK_W / 2 + 0.19, 0.9, SEG_LEN / 2);
  grp.add(rw);

  // Decorative pillars at junctions
  [-4.6, 4.6].forEach(function(px) {
    [0, SEG_LEN].forEach(function(pz) {
      var ph = 2.8 + Math.random() * 1.5;
      var p = box(0.65, ph, 0.65, M.pillar);
      p.position.set(px, ph / 2, pz);
      p.castShadow = true;
      grp.add(p);
    });
  });

  // Random side torches (visual)
  var numTorches = 1 + Math.floor(Math.random() * 3);
  for (var ti = 0; ti < numTorches; ti++) {
    var side = Math.random() < 0.5 ? -1 : 1;
    var tz = 5 + Math.random() * (SEG_LEN - 10);
    var torch = box(0.12, 0.8, 0.12, M.pillar);
    torch.position.set(side * 4.8, 0.9, tz);
    grp.add(torch);
    var flame = box(0.22, 0.25, 0.22, M.fire);
    flame.position.set(side * 4.8, 1.45, tz);
    grp.add(flame);
  }

  scene.add(grp);
  return grp;
}

// Obstacle mesh helpers
function removeExtra(arr) {
  if (!arr) return;
  arr.forEach(function(m) { scene.remove(m); });
}

function placeBarrier(obs) {
  var lx = LANES[obs.lane];
  var bh = 2.6;
  var m = box(2.05, bh, 0.55, M.barrier);
  m.position.set(lx, bh / 2, obs.wz);
  m.castShadow = true;
  scene.add(m);

  var glow = box(2.05, 0.10, 0.55, M.fire);
  glow.position.set(lx, 0.05, obs.wz);
  scene.add(glow);

  // Carved detail cross
  var cx = box(1.6, 0.15, 0.6, M.dead);
  cx.position.set(lx, 1.3, obs.wz);
  scene.add(cx);

  obs.mesh = m;
  obs.extra = [glow, cx];
}

function placeRoot(obs) {
  var lx = LANES[obs.lane];
  var m = box(2.1, 0.50, 0.55, M.root);
  m.position.set(lx, 0.25, obs.wz);
  m.castShadow = true;
  scene.add(m);

  // Curved top detail
  var top = box(2.1, 0.14, 0.35, M.pillar);
  top.position.set(lx, 0.53, obs.wz);
  scene.add(top);

  obs.mesh = m;
  obs.extra = [top];
}

function placeBeam(obs) {
  // Beam spanning all lanes overhead
  var bw = TRACK_W * 0.92;
  var m = box(bw, 0.65, 0.55, M.beam);
  m.position.set(0, 1.45, obs.wz);
  m.castShadow = true;
  scene.add(m);

  // Support columns
  var lc = box(0.30, 1.45, 0.30, M.beam);
  lc.position.set(-(bw / 2 - 0.15), 0.725, obs.wz);
  scene.add(lc);
  var rc = box(0.30, 1.45, 0.30, M.beam);
  rc.position.set(bw / 2 - 0.15, 0.725, obs.wz);
  scene.add(rc);

  // Glow strip under beam
  var gs = box(bw, 0.06, 0.5, M.fire);
  gs.position.set(0, 1.12, obs.wz);
  scene.add(gs);

  obs.mesh = m;
  obs.extra = [lc, rc, gs];
}

function placeGap(obs) {
  var gLen = obs.gLen;
  // Dark pit
  var pit = box(TRACK_W * 0.9, 0.06, gLen, M.gap);
  pit.position.set(0, 0.01, obs.wz + gLen / 2);
  scene.add(pit);

  // Pit void
  var void2 = box(TRACK_W * 0.82, 0.35, gLen, M.gap);
  void2.position.set(0, -0.17, obs.wz + gLen / 2);
  scene.add(void2);

  obs.mesh = pit;
  obs.extra = [void2];
}

function placeFire(obs) {
  var lx = LANES[obs.lane];
  var m = box(1.3, 2.3, 0.55, M.fire);
  m.position.set(lx, 1.15, obs.wz);
  scene.add(m);

  var cone = new THREE.Mesh(new THREE.ConeGeometry(0.55, 0.9, 6), M.fire);
  cone.position.set(lx, 2.75, obs.wz);
  scene.add(cone);

  // Fire light
  var fl = new THREE.PointLight(0xff6600, 2.5, 10);
  fl.position.set(lx, 2.5, obs.wz);
  scene.add(fl);

  obs.mesh = m;
  obs.extra = [cone, fl];
}

function removeObsMesh(obs) {
  if (obs.mesh) { scene.remove(obs.mesh); obs.mesh = null; }
  removeExtra(obs.extra); obs.extra = [];
}

function removeCoinMesh(c) {
  if (c.mesh) { scene.remove(c.mesh); c.mesh = null; }
}

function makeCoinMesh(c) {
  var geo = new THREE.TorusGeometry(0.20, 0.07, 8, 16);
  var m = new THREE.Mesh(geo, M.coin);
  m.position.set(c.x, c.y, c.wz);
  m.rotation.x = Math.PI / 2;
  scene.add(m);
  c.mesh = m;
}

// ── Segment Content Generation ────────────────────────────
function genContent(seg) {
  seg.obstacles.forEach(function(o) { removeObsMesh(o); });
  seg.obstacles = [];
  seg.coins.forEach(function(c) { removeCoinMesh(c); });
  seg.coins = [];

  var idx = seg.idx;
  var nearZ = seg.nearZ;

  // First few segments are obstacle-free
  if (idx < 3) {
    // Just coins in middle lane
    for (var ci = 0; ci < 5; ci++) {
      var coin = { x: LANES[1], y: 0.7, wz: nearZ + 5 + ci * 2.2, mesh: null, collected: false };
      makeCoinMesh(coin);
      seg.coins.push(coin);
    }
    return;
  }

  var diff = Math.min(10, (idx - 3) * 0.45);
  var usedZ = [];

  // Obstacle row count
  var maxRows = diff < 2 ? 1 : (diff < 5 ? 2 : 3);
  var numRows = 1 + Math.floor(Math.random() * maxRows);

  for (var r = 0; r < numRows; r++) {
    var frac = (r + 1) / (numRows + 1);
    var obsZ = nearZ + 4 + frac * (SEG_LEN - 8);

    var tooClose = usedZ.some(function(z) { return Math.abs(z - obsZ) < 6; });
    if (tooClose) continue;
    usedZ.push(obsZ);

    var roll = Math.random();
    var type;
    if (diff < 2) {
      type = roll < 0.55 ? 'barrier' : (roll < 0.8 ? 'root' : 'fire');
    } else if (diff < 5) {
      if (roll < 0.35) type = 'barrier';
      else if (roll < 0.55) type = 'root';
      else if (roll < 0.72) type = 'beam';
      else if (roll < 0.88) type = 'fire';
      else type = 'gap';
    } else {
      if (roll < 0.28) type = 'barrier';
      else if (roll < 0.44) type = 'root';
      else if (roll < 0.60) type = 'beam';
      else if (roll < 0.76) type = 'fire';
      else type = 'gap';
    }

    if (type === 'barrier' || type === 'fire') {
      var numBlocked = (diff > 4 && Math.random() < 0.38) ? 2 : 1;
      // pick random lanes ensuring at least 1 free
      var laneArr = [0, 1, 2].sort(function() { return Math.random() - 0.5; });
      for (var li = 0; li < Math.min(numBlocked, 2); li++) {
        var obs = { type: type, lane: laneArr[li], wz: obsZ, mesh: null, extra: [], triggered: false };
        if (type === 'fire') placeFire(obs);
        else placeBarrier(obs);
        seg.obstacles.push(obs);
      }
    } else if (type === 'root') {
      var laneR = Math.floor(Math.random() * 3);
      var obsR = { type: 'root', lane: laneR, wz: obsZ, mesh: null, extra: [], triggered: false };
      placeRoot(obsR);
      seg.obstacles.push(obsR);
    } else if (type === 'beam') {
      var obsB = { type: 'beam', wz: obsZ, mesh: null, extra: [], triggered: false };
      placeBeam(obsB);
      seg.obstacles.push(obsB);
    } else if (type === 'gap') {
      var gapLen = 2.5 + Math.random() * 1.5;
      var obsG = { type: 'gap', wz: obsZ, gLen: gapLen, mesh: null, extra: [], triggered: false };
      placeGap(obsG);
      seg.obstacles.push(obsG);
    }
  }

  // Generate coins - prefer a lane that is NOT blocked by barriers
  var blockedLanes = {};
  seg.obstacles.forEach(function(o) {
    if (o.lane !== undefined) blockedLanes[o.lane] = true;
  });
  var freeLanes = [0, 1, 2].filter(function(l) { return !blockedLanes[l]; });
  var coinLane = freeLanes.length > 0 ? freeLanes[Math.floor(Math.random() * freeLanes.length)] : Math.floor(Math.random() * 3);

  // Straight coin row near start of segment
  for (var ci2 = 0; ci2 < 5; ci2++) {
    var c2 = { x: LANES[coinLane], y: 0.7, wz: nearZ + 2.5 + ci2 * 1.8, mesh: null, collected: false };
    makeCoinMesh(c2);
    seg.coins.push(c2);
  }

  // Possibly an arc of coins (guides player to jump)
  if (Math.random() < 0.35 && !seg.obstacles.some(function(o) { return o.type === 'beam'; })) {
    var arcLane = Math.floor(Math.random() * 3);
    var arcCenterZ = nearZ + SEG_LEN * 0.7;
    for (var ai = 0; ai < 7; ai++) {
      var t = (ai - 3) / 3.0;
      var arcY = 0.65 + 0.75 * (1.0 - t * t);
      var arcC = { x: LANES[arcLane], y: arcY, wz: arcCenterZ + t * 3.5, mesh: null, collected: false };
      makeCoinMesh(arcC);
      seg.coins.push(arcC);
    }
  }
}

function createSegment(nearZ, idx) {
  var seg = {
    nearZ: nearZ,
    farZ: nearZ + SEG_LEN,
    idx: idx,
    floorGroup: makeFloorGroup(),
    obstacles: [],
    coins: []
  };
  seg.floorGroup.position.z = nearZ;
  genContent(seg);
  return seg;
}

function recycleSegment(seg, newNearZ, newIdx) {
  seg.obstacles.forEach(function(o) { removeObsMesh(o); });
  seg.obstacles = [];
  seg.coins.forEach(function(c) { removeCoinMesh(c); });
  seg.coins = [];

  seg.nearZ = newNearZ;
  seg.farZ  = newNearZ + SEG_LEN;
  seg.idx   = newIdx;
  seg.floorGroup.position.z = newNearZ;

  genContent(seg);
}

function initSegments() {
  // Clear existing
  segments.forEach(function(seg) {
    scene.remove(seg.floorGroup);
    seg.obstacles.forEach(function(o) { removeObsMesh(o); });
    seg.coins.forEach(function(c) { removeCoinMesh(c); });
  });
  segments = [];
  globalSegIdx = 0;

  // Create pool, starting from slightly before player
  var startZ = PLAYER_START_Z - SEG_LEN;
  for (var i = 0; i < POOL_SIZE; i++) {
    var seg = createSegment(startZ + i * SEG_LEN, globalSegIdx++);
    segments.push(seg);
  }
  nextFarZ = startZ + POOL_SIZE * SEG_LEN;
}

function manageSegments() {
  var pz = P.z;
  for (var i = 0; i < segments.length; i++) {
    var seg = segments[i];
    if (seg.farZ < pz - BEHIND_CULL) {
      recycleSegment(seg, nextFarZ, globalSegIdx++);
      nextFarZ = seg.farZ;
    }
  }
}

// ── Input ─────────────────────────────────────────────────
var K = {};
var touchStartX = 0, touchStartY = 0;

document.addEventListener('keydown', function(e) {
  K[e.code] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','KeyA','KeyD','KeyW','KeyS','Space'].indexOf(e.code) >= 0) {
    e.preventDefault();
  }
  if (!G.running || G.over || P.dead) return;

  if (e.code === 'ArrowLeft'  || e.code === 'KeyA') shiftLane(-1);
  if (e.code === 'ArrowRight' || e.code === 'KeyD') shiftLane(1);
  if (e.code === 'ArrowUp'    || e.code === 'KeyW' || e.code === 'Space') doJump();
  if (e.code === 'ArrowDown'  || e.code === 'KeyS') doSlide();
});
document.addEventListener('keyup', function(e) { K[e.code] = false; });

document.addEventListener('touchstart', function(e) {
  var t = e.changedTouches[0];
  touchStartX = t.clientX; touchStartY = t.clientY;
}, {passive: true});

document.addEventListener('touchend', function(e) {
  if (!G.running || G.over || P.dead) return;
  var t  = e.changedTouches[0];
  var dx = t.clientX - touchStartX;
  var dy = t.clientY - touchStartY;
  var adx = Math.abs(dx), ady = Math.abs(dy);
  if (adx < 10 && ady < 10) return;
  if (adx > ady) {
    shiftLane(dx > 0 ? -1 : 1);
  } else {
    if (dy < 0) doJump(); else doSlide();
  }
}, {passive: true});

function shiftLane(dir) {
  P.targetLane = Math.max(0, Math.min(2, P.targetLane + dir));
}

function doJump() {
  if (P.jumping || P.sliding) return;
  if (P.y > 0.1) return; // already in air
  P.vy = JUMP_VY;
  P.jumping = true;
}

function doSlide() {
  if (P.jumping && P.y > 0.3) return;
  if (P.sliding) return;
  P.sliding = true;
  P.slideTimer = SLIDE_DUR;
}

// ── Collision ─────────────────────────────────────────────
function checkCollisions() {
  if (P.dead || P.invincible > 0) return;

  var pz   = P.z;
  var px   = P.x;
  var py   = P.y;
  var hitH = P.sliding ? 0.55 : 1.70;  // player hitbox height above ground

  // Detect which lane player is closest to
  var closestLane = 0;
  var minDist = Math.abs(px - LANES[0]);
  for (var li = 1; li < 3; li++) {
    var d = Math.abs(px - LANES[li]);
    if (d < minDist) { minDist = d; closestLane = li; }
  }

  for (var si = 0; si < segments.length; si++) {
    var seg = segments[si];
    // Quick cull: skip segment if out of range
    if (pz < seg.nearZ - 4 || pz > seg.farZ + 4) continue;

    for (var oi = 0; oi < seg.obstacles.length; oi++) {
      var obs = seg.obstacles[oi];
      if (obs.triggered) continue;

      var dz = Math.abs(pz - obs.wz);

      // For gap: check Z range differently
      if (obs.type === 'gap') {
        var inGap = (pz >= obs.wz - 0.2) && (pz <= obs.wz + obs.gLen + 0.2);
        if (inGap && py < 0.18) {
          obs.triggered = true;
          die();
          return;
        }
        if (pz > obs.wz + obs.gLen + 0.3) obs.triggered = true;
        continue;
      }

      if (dz > 1.1) continue; // not at obstacle Z

      if (obs.type === 'barrier' || obs.type === 'fire') {
        // Must be in different lane
        if (closestLane === obs.lane && minDist < 1.2) {
          obs.triggered = true;
          die(); return;
        }
      } else if (obs.type === 'root') {
        // Must jump over: player y must be > 0.45
        if (closestLane === obs.lane && minDist < 1.1 && py < 0.44) {
          obs.triggered = true;
          die(); return;
        }
      } else if (obs.type === 'beam') {
        // Must slide: player hitbox top must be < 1.12
        var playerTop = py + hitH;
        if (playerTop > 1.12 && py < 1.80) {
          obs.triggered = true;
          die(); return;
        }
      }

      if (dz < 0.5) obs.triggered = true; // mark as passed safely
    }

    // Coin collection
    for (var ci = 0; ci < seg.coins.length; ci++) {
      var coin = seg.coins[ci];
      if (coin.collected) continue;
      if (!coin.mesh) continue;
      var cdz = Math.abs(pz - coin.wz);
      var cdx = Math.abs(px - coin.x);
      var cdy = Math.abs(py - coin.y + 0.0);
      if (cdz < 1.0 && cdx < 1.1 && cdy < 0.9) {
        coin.collected = true;
        scene.remove(coin.mesh); coin.mesh = null;
        G.coins++;
        G.score += COIN_SCORE;
        flashScore();
      }
    }
  }
}

var scoreFlashTimer = 0;
function flashScore() {
  scoreFlashTimer = 0.25;
}

function die() {
  if (P.dead) return;
  P.dead = true;
  P.deathTimer = 0;
  G.dmgFlash = 0.8;

  // Update high score
  if (G.score > G.hs) { G.hs = G.score; saveHS(G.hs); }

  // Show game over after a delay
  setTimeout(function() { showOver(); }, 1800);
}

// ── Animation ─────────────────────────────────────────────
function animChar(dt) {
  var root = char.root;

  if (P.dead) {
    P.deathTimer += dt;
    root.rotation.x = Math.min(Math.PI * 0.45, P.deathTimer * 3.5);
    root.position.set(P.x, Math.max(-0.5, P.y + 0.3 - P.deathTimer * 1.5), P.z);
    return;
  }

  // Slide: squish
  if (P.sliding) {
    root.scale.set(1.15, 0.50, 1.0);
    root.rotation.x = -0.5;
    root.position.set(P.x, P.y + 0.18, P.z);
    return;
  }

  root.scale.set(1, 1, 1);
  root.rotation.x = 0;
  root.position.set(P.x, P.y, P.z);

  // Running leg/arm swing
  P.runPhase += dt * G.speed * 1.6;
  var sw = Math.sin(P.runPhase) * 0.55;
  char.llG.rotation.x =  sw;
  char.rlG.rotation.x = -sw;
  char.laG.rotation.x = -sw * 0.65;
  char.raG.rotation.x =  sw * 0.65;

  // Jump pose
  if (P.jumping && P.vy > 0) {
    char.llG.rotation.x = 0.45;
    char.rlG.rotation.x = 0.45;
    char.laG.rotation.x = -0.6;
    char.raG.rotation.x = -0.6;
  }

  // Lane tilt
  var wantTilt = (LANES[P.targetLane] - P.x) * -0.28;
  P.tilt += (wantTilt - P.tilt) * 0.18;
  root.rotation.z = P.tilt;
}

// ── Update ────────────────────────────────────────────────
function updatePlayer(dt) {
  if (P.dead) return;

  // Forward run
  var spd = G.speed;
  P.z += spd * dt;

  // Lane lerp
  P.x += (LANES[P.targetLane] - P.x) * LANE_SPD * dt;

  // Jump physics
  if (P.jumping || P.y > 0.01) {
    P.vy -= GRAVITY * dt;
    P.y  += P.vy * dt;
    if (P.y <= 0) {
      P.y = 0; P.vy = 0; P.jumping = false;
    }
  }

  // Slide timer
  if (P.sliding) {
    P.slideTimer -= dt;
    if (P.slideTimer <= 0) { P.sliding = false; P.slideTimer = 0; }
  }

  // Invincibility
  if (P.invincible > 0) P.invincible -= dt;

  // Distance and score
  G.dist = Math.floor(P.z - PLAYER_START_Z);
  G.score = G.dist + G.coins * COIN_SCORE;
  if (G.score > G.hs) { G.hs = G.score; }

  // Speed ramp
  G.speed = Math.min(MAX_SPEED, BASE_SPEED + G.dist * 0.012);
}

function updateCamera() {
  var px = P.x;
  var py = P.y;
  var pz = P.z;

  var deadLean = P.dead ? Math.min(1.5, P.deathTimer * 1.8) : 0;

  camera.position.set(
    px * 0.55,
    py + 5.5 + deadLean * 1.5,
    pz - 9.5 - deadLean * 2
  );
  camera.lookAt(
    px * 0.25,
    py + 0.6,
    pz + 8
  );

  // Move forward light with player
  fwdLight.position.set(px, py + 3, pz + 18);
}

function updateCoins(dt) {
  for (var si = 0; si < segments.length; si++) {
    var seg = segments[si];
    for (var ci = 0; ci < seg.coins.length; ci++) {
      var c = seg.coins[ci];
      if (!c.collected && c.mesh) {
        c.mesh.rotation.y += dt * 3.0;
      }
    }
  }
}

function updateHUD() {
  document.getElementById('hud-score').textContent = G.score.toLocaleString();
  document.getElementById('hud-dist').textContent  = 'DIST: ' + G.dist + 'm';
  document.getElementById('hud-best').textContent  = 'BEST: ' + G.hs.toLocaleString();
  document.getElementById('hud-coins').textContent = '\u25C6 ' + G.coins;
  document.getElementById('hud-speed').textContent = 'SPEED: ' + (G.speed / BASE_SPEED).toFixed(1) + 'x';

  // Score flash
  var se = document.getElementById('hud-score');
  if (scoreFlashTimer > 0) {
    scoreFlashTimer -= 0.016;
    se.style.color = '#ffffff';
    se.style.textShadow = '0 0 24px rgba(255,255,100,.9)';
  } else {
    se.style.color = '#ffcc44';
    se.style.textShadow = '0 0 16px rgba(255,180,0,.7),0 2px 0 #000';
  }

  // Damage flash
  var dfEl = document.getElementById('dmg-flash');
  if (G.dmgFlash > 0) {
    G.dmgFlash -= 0.016;
    dfEl.style.opacity = Math.max(0, G.dmgFlash).toString();
  } else {
    dfEl.style.opacity = '0';
  }
}

// ── Screens ───────────────────────────────────────────────
function showOver() {
  document.getElementById('fin-score').textContent = G.score.toLocaleString();
  document.getElementById('fin-best').textContent  = G.hs.toLocaleString();
  document.getElementById('fin-dist').textContent  = G.dist + 'm';
  document.getElementById('fin-coins').textContent = G.coins.toString();
  document.getElementById('over-screen').style.display = 'flex';
  G.over = true;
}

function startGame() {
  // Reset game state
  G.running = true; G.over = false;
  G.speed = BASE_SPEED; G.dist = 0; G.score = 0; G.coins = 0; G.dmgFlash = 0;

  // Reset player
  P.lane = 1; P.targetLane = 1;
  P.x = LANES[1]; P.y = 0; P.z = PLAYER_START_Z;
  P.vy = 0; P.jumping = false; P.sliding = false; P.slideTimer = 0;
  P.dead = false; P.deathTimer = 0; P.runPhase = 0; P.tilt = 0; P.invincible = 0;

  // Reset character pose
  char.root.rotation.set(0, 0, 0);
  char.root.scale.set(1, 1, 1);

  // Init segments
  nextFarZ = PLAYER_START_Z - SEG_LEN + POOL_SIZE * SEG_LEN;
  initSegments();

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('over-screen').style.display  = 'none';
  document.getElementById('hud').style.display          = 'block';
  document.getElementById('dmg-flash').style.opacity    = '0';
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// ── Main Loop ─────────────────────────────────────────────
var prevTime = performance.now();

function loop() {
  requestAnimationFrame(loop);
  var now = performance.now();
  var dt  = Math.min((now - prevTime) / 1000, 0.05);
  prevTime = now;

  if (G.running && !G.over) {
    updatePlayer(dt);
    checkCollisions();
    manageSegments();
    updateCoins(dt);
    animChar(dt);
    updateCamera();
    updateHUD();
  }

  renderer.render(scene, camera);
}

// Init camera
camera.position.set(LANES[1] * 0.55, 5.5, PLAYER_START_Z - 9.5);
camera.lookAt(LANES[1] * 0.25, 0.6, PLAYER_START_Z + 8);

// Start render loop
loop();
</script>
</body>
